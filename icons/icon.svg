<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definition for Gradient -->
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Maskable PWA Background -->
  <rect width="512" height="512" rx="128" fill="#09090b" />
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#icon-grad)" stroke-width="12" stroke-opacity="0.3" filter="url(#glow-filter)" />
  
  <!-- Inner Logo Symbol (Apex Arrow / Pyramid) -->
  <path d="M 256 120 L 376 340 L 320 340 L 256 220 L 192 340 L 136 340 Z" fill="url(#icon-grad)" filter="url(#glow-filter)" />
  
  <!-- Little Accent Dot -->
  <circle cx="256" cy="380" r="14" fill="#d946ef" />
</svg>
